<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Amruta 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@200;300;400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#000;color:#faf7f2;font-family:'Montserrat',sans-serif;overflow-x:hidden;cursor:none}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#000}
    ::-webkit-scrollbar-thumb{background:#c8607a;border-radius:2px}
    ::selection{background:rgba(200,96,122,0.3)}
    #cursor{width:10px;height:10px;background:#f2a8c0;border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen}
    #cursor-ring{width:32px;height:32px;border:1px solid rgba(242,168,192,0.45);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all .14s cubic-bezier(.23,1,.32,1)}
  </style>
  <script type="module" crossorigin src="/baby-birthday/assets/index-BvKT5fg2.js"></script>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div id="root"></div>
  <script>
    const c=document.getElementById('cursor'),r=document.getElementById('cursor-ring')
    document.addEventListener('mousemove',e=>{
      c.style.left=e.clientX+'px';c.style.top=e.clientY+'px'
      r.style.left=e.clientX+'px';r.style.top=e.clientY+'px'
    })
    document.addEventListener('mousedown',()=>{c.style.width='18px';c.style.height='18px'})
    document.addEventListener('mouseup',()=>{c.style.width='10px';c.style.height='10px'})
  </script>
</body>
</html>
